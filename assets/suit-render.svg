<svg viewBox="0 0 500 720" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- nanofiber weave texture -->
    <pattern id="fiber" width="10" height="10" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="10" y2="10" stroke="rgba(204,0,34,0.18)" stroke-width="0.5"/>
      <line x1="10" y1="0" x2="0" y2="10" stroke="rgba(204,0,34,0.18)" stroke-width="0.5"/>
    </pattern>

    <!-- hex grid overlay -->
    <pattern id="hex" width="24" height="28" patternUnits="userSpaceOnUse">
      <polygon points="12,1 22,6.5 22,17.5 12,23 2,17.5 2,6.5"
               fill="none" stroke="rgba(204,0,34,0.12)" stroke-width="0.6"/>
      <polygon points="24,15 34,20.5 34,31.5 24,37 14,31.5 14,20.5"
               fill="none" stroke="rgba(204,0,34,0.12)" stroke-width="0.6"/>
    </pattern>

    <!-- plate dark gradient -->
    <linearGradient id="plateGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="40%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>

    <!-- chest center gradient (crimson core) -->
    <radialGradient id="coreGrad" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#3a0008"/>
      <stop offset="50%" stop-color="#160003"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>

    <!-- shoulder gradient -->
    <linearGradient id="shoulderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#222"/>
      <stop offset="100%" stop-color="#060606"/>
    </linearGradient>

    <!-- red edge glow filter -->
    <filter id="redGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- strong pulse glow -->
    <filter id="pulseGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- clip to torso -->
    <clipPath id="torsoClip">
      <path d="M 220,18 L 248,4 L 252,4 L 280,18
               Q 340,42 420,95 Q 468,130 472,175
               L 458,420 L 440,560 L 410,650 L 250,668 L 90,650
               L 60,560 L 42,420 L 28,175
               Q 32,130 80,95 Q 160,42 220,18 Z"/>
    </clipPath>

  </defs>

  <!-- ═══ BACKGROUND GLOW BEHIND SUIT ═══ -->
  <ellipse cx="250" cy="380" rx="210" ry="340"
           fill="rgba(204,0,34,0.06)" filter="url(#pulseGlow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ═══ MAIN TORSO SILHOUETTE ═══ -->
  <path d="M 220,18 L 248,4 L 252,4 L 280,18
           Q 340,42 420,95 Q 468,130 472,175
           L 458,420 L 440,560 L 410,650 L 250,668 L 90,650
           L 60,560 L 42,420 L 28,175
           Q 32,130 80,95 Q 160,42 220,18 Z"
        fill="url(#coreGrad)" stroke="none"/>

  <!-- nanofiber texture on torso -->
  <path d="M 220,18 L 248,4 L 252,4 L 280,18
           Q 340,42 420,95 Q 468,130 472,175
           L 458,420 L 440,560 L 410,650 L 250,668 L 90,650
           L 60,560 L 42,420 L 28,175
           Q 32,130 80,95 Q 160,42 220,18 Z"
        fill="url(#fiber)" opacity="0.6"/>

  <!-- ═══ COLLAR / NECK ARMOR ═══ -->
  <path d="M 210,22 L 248,6 L 252,6 L 290,22 L 295,60 L 280,75 L 250,80 L 220,75 L 205,60 Z"
        fill="url(#plateGrad)" stroke="#cc0022" stroke-width="1.2" filter="url(#redGlow)"/>
  <!-- collar center line -->
  <line x1="250" y1="22" x2="250" y2="78" stroke="rgba(204,0,34,0.6)" stroke-width="0.8"/>
  <!-- collar hex texture -->
  <path d="M 210,22 L 248,6 L 252,6 L 290,22 L 295,60 L 280,75 L 250,80 L 220,75 L 205,60 Z"
        fill="url(#hex)" opacity="0.8"/>

  <!-- ═══ LEFT SHOULDER PAULDRON ═══ -->
  <path d="M 220,18 Q 160,42 80,95 Q 40,122 28,158
           L 42,185 L 80,175 L 130,150 L 175,120 L 210,90 L 225,60 L 220,18 Z"
        fill="url(#shoulderGrad)" stroke="#cc0022" stroke-width="1.3" filter="url(#redGlow)"/>
  <path d="M 220,18 Q 160,42 80,95 Q 40,122 28,158
           L 42,185 L 80,175 L 130,150 L 175,120 L 210,90 L 225,60 L 220,18 Z"
        fill="url(#fiber)" opacity="0.5"/>
  <!-- shoulder accent lines -->
  <line x1="80" y1="95" x2="140" y2="160" stroke="rgba(204,0,34,0.5)" stroke-width="0.8"/>
  <line x1="55" y1="128" x2="110" y2="168" stroke="rgba(204,0,34,0.3)" stroke-width="0.6"/>

  <!-- ═══ RIGHT SHOULDER PAULDRON ═══ -->
  <path d="M 280,18 Q 340,42 420,95 Q 460,122 472,158
           L 458,185 L 420,175 L 370,150 L 325,120 L 290,90 L 275,60 L 280,18 Z"
        fill="url(#shoulderGrad)" stroke="#cc0022" stroke-width="1.3" filter="url(#redGlow)"/>
  <path d="M 280,18 Q 340,42 420,95 Q 460,122 472,158
           L 458,185 L 420,175 L 370,150 L 325,120 L 290,90 L 275,60 L 280,18 Z"
        fill="url(#fiber)" opacity="0.5"/>
  <line x1="420" y1="95" x2="360" y2="160" stroke="rgba(204,0,34,0.5)" stroke-width="0.8"/>
  <line x1="445" y1="128" x2="390" y2="168" stroke="rgba(204,0,34,0.3)" stroke-width="0.6"/>

  <!-- ═══ LEFT PECTORAL PLATE ═══ -->
  <path d="M 78,185 L 100,168 L 210,92 L 230,130 L 242,200 L 238,290 L 145,320 L 68,290 L 62,220 Z"
        fill="url(#plateGrad)" stroke="#cc0022" stroke-width="1.4" filter="url(#redGlow)"/>
  <path d="M 78,185 L 100,168 L 210,92 L 230,130 L 242,200 L 238,290 L 145,320 L 68,290 L 62,220 Z"
        fill="url(#hex)" opacity="0.7"/>
  <!-- pec plate internal lines -->
  <line x1="100" y1="200" x2="230" y2="150" stroke="rgba(204,0,34,0.25)" stroke-width="0.7"/>
  <line x1="90" y1="255" x2="235" y2="230" stroke="rgba(204,0,34,0.2)" stroke-width="0.6"/>

  <!-- ═══ RIGHT PECTORAL PLATE ═══ -->
  <path d="M 422,185 L 400,168 L 290,92 L 270,130 L 258,200 L 262,290 L 355,320 L 432,290 L 438,220 Z"
        fill="url(#plateGrad)" stroke="#cc0022" stroke-width="1.4" filter="url(#redGlow)"/>
  <path d="M 422,185 L 400,168 L 290,92 L 270,130 L 258,200 L 262,290 L 355,320 L 432,290 L 438,220 Z"
        fill="url(#hex)" opacity="0.7"/>
  <line x1="400" y1="200" x2="270" y2="150" stroke="rgba(204,0,34,0.25)" stroke-width="0.7"/>
  <line x1="410" y1="255" x2="265" y2="230" stroke="rgba(204,0,34,0.2)" stroke-width="0.6"/>

  <!-- ═══ STERNUM / CENTER DIVIDE ═══ -->
  <line x1="250" y1="80" x2="250" y2="340" stroke="#cc0022" stroke-width="1.5" filter="url(#redGlow)"/>

  <!-- ═══ CHEST CENTER EMBLEM ═══ -->
  <!-- outer ring -->
  <circle cx="250" cy="210" r="38" fill="none" stroke="#cc0022" stroke-width="1.8" filter="url(#redGlow)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- inner ring -->
  <circle cx="250" cy="210" r="28" fill="rgba(204,0,34,0.08)" stroke="#cc0022" stroke-width="0.9" filter="url(#redGlow)"/>
  <!-- core dot -->
  <circle cx="250" cy="210" r="10" fill="#cc0022" filter="url(#pulseGlow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <!-- ring tick marks -->
  <g stroke="#cc0022" stroke-width="1.2" opacity="0.8">
    <line x1="250" y1="168" x2="250" y2="175"/>
    <line x1="250" y1="245" x2="250" y2="252"/>
    <line x1="208" y1="210" x2="215" y2="210"/>
    <line x1="285" y1="210" x2="292" y2="210"/>
    <line x1="223" y1="183" x2="228" y2="188"/>
    <line x1="272" y1="232" x2="277" y2="237"/>
    <line x1="277" y1="183" x2="272" y2="188"/>
    <line x1="228" y1="232" x2="223" y2="237"/>
  </g>

  <!-- ═══ ABDOMINAL PLATES ═══ -->
  <!-- ab plate 1 -->
  <path d="M 68,295 L 240,295 L 242,340 L 68,340 Z"
        fill="url(#plateGrad)" stroke="#cc0022" stroke-width="1.1" filter="url(#redGlow)"/>
  <path d="M 262,295 L 432,295 L 432,340 L 258,340 Z"
        fill="url(#plateGrad)" stroke="#cc0022" stroke-width="1.1" filter="url(#redGlow)"/>
  <!-- ab divider -->
  <rect x="244" y="295" width="12" height="45" fill="#000"/>
  <line x1="250" y1="295" x2="250" y2="340" stroke="rgba(204,0,34,0.4)" stroke-width="0.8"/>

  <!-- ab plate 2 -->
  <path d="M 60,348 L 240,348 L 242,398 L 60,392 Z"
        fill="url(#plateGrad)" stroke="#cc0022" stroke-width="1.1" filter="url(#redGlow)"/>
  <path d="M 260,348 L 440,348 L 440,392 L 258,398 Z"
        fill="url(#plateGrad)" stroke="#cc0022" stroke-width="1.1" filter="url(#redGlow)"/>
  <rect x="244" y="348" width="12" height="50" fill="#000"/>
  <line x1="250" y1="348" x2="250" y2="398" stroke="rgba(204,0,34,0.4)" stroke-width="0.8"/>

  <!-- ab plate 3 -->
  <path d="M 55,406 L 240,406 L 242,456 L 58,448 Z"
        fill="url(#plateGrad)" stroke="#cc0022" stroke-width="1.1" filter="url(#redGlow)"/>
  <path d="M 260,406 L 445,406 L 442,448 L 258,456 Z"
        fill="url(#plateGrad)" stroke="#cc0022" stroke-width="1.1" filter="url(#redGlow)"/>
  <rect x="244" y="406" width="12" height="50" fill="#000"/>
  <line x1="250" y1="406" x2="250" y2="456" stroke="rgba(204,0,34,0.4)" stroke-width="0.8"/>

  <!-- ab hex texture -->
  <path d="M 68,295 L 240,295 L 242,456 L 58,448 Z" fill="url(#hex)" opacity="0.5"/>
  <path d="M 262,295 L 432,295 L 442,448 L 258,456 Z" fill="url(#hex)" opacity="0.5"/>

  <!-- ═══ BELT / WAIST PLATE ═══ -->
  <path d="M 52,462 L 448,462 L 445,510 L 55,510 Z"
        fill="#0a0a0a" stroke="#cc0022" stroke-width="1.8" filter="url(#redGlow)"/>
  <path d="M 52,462 L 448,462 L 445,510 L 55,510 Z" fill="url(#fiber)" opacity="0.4"/>
  <!-- belt center buckle -->
  <rect x="228" y="470" width="44" height="32" rx="3"
        fill="#0d0d0d" stroke="#cc0022" stroke-width="1.5" filter="url(#redGlow)"/>
  <rect x="238" y="478" width="24" height="16" rx="2"
        fill="#cc0022" opacity="0.25"/>
  <line x1="250" y1="470" x2="250" y2="502" stroke="rgba(204,0,34,0.5)" stroke-width="0.8"/>
  <!-- belt status dots -->
  <circle cx="140" cy="486" r="4" fill="#cc0022" filter="url(#redGlow)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="486" r="4" fill="#cc0022" filter="url(#redGlow)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="486" r="4" fill="#cc0022" filter="url(#redGlow)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="360" cy="486" r="4" fill="#cc0022" filter="url(#redGlow)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- ═══ LOWER TORSO PANELS ═══ -->
  <path d="M 55,518 L 445,518 L 435,590 L 65,590 Z"
        fill="url(#plateGrad)" stroke="#cc0022" stroke-width="1.2" filter="url(#redGlow)"/>
  <path d="M 55,518 L 445,518 L 435,590 L 65,590 Z" fill="url(#hex)" opacity="0.5"/>
  <!-- panel dividers -->
  <line x1="155" y1="518" x2="148" y2="590" stroke="rgba(204,0,34,0.35)" stroke-width="0.8"/>
  <line x1="250" y1="518" x2="250" y2="590" stroke="rgba(204,0,34,0.5)" stroke-width="1"/>
  <line x1="345" y1="518" x2="352" y2="590" stroke="rgba(204,0,34,0.35)" stroke-width="0.8"/>

  <path d="M 65,598 L 435,598 L 415,660 L 85,660 Z"
        fill="url(#plateGrad)" stroke="#cc0022" stroke-width="1.2" filter="url(#redGlow)"/>
  <path d="M 65,598 L 435,598 L 415,660 L 85,660 Z" fill="url(#fiber)" opacity="0.4"/>
  <line x1="250" y1="598" x2="250" y2="660" stroke="rgba(204,0,34,0.45)" stroke-width="1"/>

  <!-- ═══ SCANNING LINE ═══ -->
  <line x1="28" y1="0" x2="472" y2="0" stroke="rgba(204,0,34,0.5)" stroke-width="1.5" filter="url(#redGlow)">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,730" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="6s" repeatCount="indefinite"/>
  </line>

  <!-- ═══ OUTER SUIT EDGE GLOW ═══ -->
  <path d="M 220,18 L 248,4 L 252,4 L 280,18
           Q 340,42 420,95 Q 468,130 472,175
           L 458,420 L 440,560 L 410,650 L 250,668 L 90,650
           L 60,560 L 42,420 L 28,175
           Q 32,130 80,95 Q 160,42 220,18 Z"
        fill="none" stroke="#cc0022" stroke-width="1.8" filter="url(#redGlow)" opacity="0.9">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3.5s" repeatCount="indefinite"/>
  </path>

  <!-- ═══ SHOULDER STATUS LIGHTS ═══ -->
  <circle cx="60" cy="195" r="5" fill="#cc0022" filter="url(#pulseGlow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="440" cy="195" r="5" fill="#cc0022" filter="url(#pulseGlow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- ═══ GOLD OROBOROS ACCENT LINES ═══ -->
  <line x1="205" y1="62" x2="135" y2="108" stroke="rgba(230,192,74,0.4)" stroke-width="0.8"/>
  <line x1="295" y1="62" x2="365" y2="108" stroke="rgba(230,192,74,0.4)" stroke-width="0.8"/>
  <line x1="175" y1="325" x2="68" y2="295" stroke="rgba(230,192,74,0.25)" stroke-width="0.6"/>
  <line x1="325" y1="325" x2="432" y2="295" stroke="rgba(230,192,74,0.25)" stroke-width="0.6"/>

  <!-- layer classification text -->
  <text x="32" y="220" font-family="monospace" font-size="8" fill="rgba(204,0,34,0.5)" letter-spacing="1">S1-S6</text>
  <text x="32" y="310" font-family="monospace" font-size="8" fill="rgba(204,0,34,0.45)" letter-spacing="1">S13</text>
  <text x="32" y="380" font-family="monospace" font-size="8" fill="rgba(204,0,34,0.4)" letter-spacing="1">S19</text>
  <text x="32" y="450" font-family="monospace" font-size="8" fill="rgba(204,0,34,0.4)" letter-spacing="1">S25</text>
  <text x="32" y="490" font-family="monospace" font-size="8" fill="rgba(230,192,74,0.5)" letter-spacing="1">S31</text>

</svg>
